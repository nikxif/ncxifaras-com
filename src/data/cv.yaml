# src/data/cv.yaml — the CV as data, not markup.
# Shape mirrors what the master-CV transform (D5) will emit, so swapping to
# generated data later is a data swap, not a page rewrite.
#
# Filled from cv-master.yaml (confirmed values only). Remaining [FILL]/[CONFIRM]
# markers are genuinely-unknown items I couldn't verify — see chat.
#
# YAML notes: quote any value with a colon-space or a leading special char;
# apostrophes are fine unquoted here (unlike frontmatter, these aren't parsed
# by the same strict path, but quoting is still the safe habit).

summary: >-
  Physician and software developer in Athens. I trained in medicine and
  computer science in parallel, and I've spent the years since working where
  the two meet: clinical research, digital health policy, and custom
  software for clinical work. Right now I'm focused on neurotechnology —
  computational neuroscience and brain–computer interfaces — on my way to
  specialising in neurology, with a long-term interest in neurorehabilitation.

